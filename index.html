<script>
let score = 0;

const regions = [
    {
        name: "North",
        territories: ["t1","t2","t3","t4","t5","t6","t7","t8","t9","t10","t11","t12","t13"],
        bonus: 8
    },
    {
        name: "Iron Islands",
        territories: ["t14","t15"],
        bonus: 1
    },
    {
        name: "Westerlands",
        territories: ["t16","t17","t18","t19","t20"],
        bonus: 3
    },
    {
        name: "Riverlands",
        territories: ["t21","t22","t23","t24","t25"],
        bonus: 3
    },
    {
        name: "The Vale",
        territories: ["t26","t27","t28","t29"],
        bonus: 2
    },
    {
        name: "The Reach",
        territories: ["R1","R2","R3","R4","R5","R6","R7"],
        bonus: 5
    },
    {
        name: "The Crownlands",
        territories: ["C1","C2","C3","C4"],
        bonus: 3
    },
    {
        name: "The Stormlands",
        territories: ["S1","S2","S3","S4"],
        bonus: 2
    },
    {
        name: "Dorne",
        territories: ["D1","D2","D3","D4"],
        bonus: 2
    }
];

function pointsToMoney(points) {
    if (points === 0) return 0;
    if (points <= 11) return 6;
    if (points <= 14) return 7;
    if (points <= 17) return 8;
    if (points <= 20) return 9;
    if (points <= 23) return 10;
    if (points <= 26) return 11;
    if (points <= 29) return 12;
    if (points <= 32) return 13;
    if (points <= 35) return 14;
    if (points <= 38) return 15;
    return 16;
}

function calculateBonusMoney() {
    let bonusMoney = 0;

    regions.forEach(region => {
        const ownsWholeRegion = region.territories.every(id => {
            const territory = document.querySelector(`[data-name="${id}"]`);
            return territory && territory.dataset.selected === "true";
        });

        if (ownsWholeRegion) {
            bonusMoney += region.bonus;
        }
    });

    return bonusMoney;
}

function updateMoneyDisplay() {
    const baseMoney = pointsToMoney(score);
    const bonusMoney = calculateBonusMoney();
    const totalMoney = baseMoney + bonusMoney;

    document.getElementById("score").textContent = score;
    document.getElementById("baseMoney").textContent = baseMoney;
    document.getElementById("bonusMoney").textContent = bonusMoney;
    document.getElementById("totalMoney").textContent = totalMoney;
}

function toggleTerritory(element) {
    const points = Number(element.dataset.points);
    const name = element.dataset.name;

    if (element.dataset.selected === "true") {
        element.dataset.selected = "false";
        element.style.background = "rgba(255,0,0,0.6)";
        score -= points;
    } else {
        element.dataset.selected = "true";
        element.style.background = "rgba(0,255,0,0.7)";
        score += points;
    }

    
    updateMoneyDisplay();
}

updateMoneyDisplay();
</script>
