<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rosk Point Counter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .map-container {
            position: relative;
            display: inline-block;
        }

        .territory {
            position: absolute;
            width: 24px;
            height: 24px;
            background: rgba(255, 0, 0, 0.6);
            border: 2px solid darkred;
            border-radius: 50%;
            cursor: pointer;

            /* Makes the circle centered on left/top */
            transform: translate(-50%, -50%);
        }

        .territory:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
    </style>
</head>

<body>

<h1>Rosk Point Counter</h1>

<h2>Total Points: <span id="score">0</span></h2>

<p>
    Last Territory Clicked:
    <strong id="selectedTerritory">None</strong>
</p>

<div class="map-container">

    <img src="Board.webp" width="800">

    <!-- WINTERFELL -->
    <div class="territory"
     data-name="Winterfell"
     data-points="2"
     style="left:411px; top:268px;"
     onclick="toggleTerritory(this)">
    </div>

    <div class="territory"
     data-name="Dragon Stone"
     data-points="3"
     style="left:596.61597px; top:745.02856px;"
     onclick="toggleTerritory(this)">
    </div>

    <div class="territory"
     data-name="The Gift"
     data-points="1"
     style="left:474.92273px; top:125.87109px;"
     onclick="toggleTerritory(this)">
    </div>

    <div class="territory"
     data-name="Bear Island"
     data-points="2"
     style="left:265.9534px; top:156.84042px;"
     onclick="toggleTerritory(this)">
    </div>

  
    <!-- Add more territories here -->

</div>

<script>

let score = 0;

function toggleTerritory(element) {

    let points = Number(element.dataset.points);
    let name = element.dataset.name;

    if (element.dataset.selected === "true") {

        element.dataset.selected = "false";
        element.style.background = "rgba(255,0,0,0.6)";
        score -= points;

    } else {

        element.dataset.selected = "true";
        element.style.background = "rgba(0,255,0,0.7)";
        score += points;

    }

    document.getElementById("score").textContent = score;
    document.getElementById("selectedTerritory").textContent = name;
}

</script>

</body>
</html>
