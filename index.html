<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rosk Point Counter</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .map-container {
            position: relative;
            display: inline-block;
        }

        .territory {
            position: absolute;
            width: 24px;
            height: 24px;
            background: rgba(255, 0, 0, 0.6);
            border: 2px solid darkred;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
        }

        .territory:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
    </style>
</head>

<body>

<h1>Rosk Point Counter</h1>

<h2>Total Points: <span id="score">0</span></h2>
<h2>Base Money: <span id="baseMoney">0</span></h2>
<h2>North Bonus: <span id="northBonus">0</span></h2>
<h2>Total Money: <span id="totalMoney">0</span></h2>
 
<p>
    Last Territory Clicked:
    <strong id="selectedTerritory">None</strong>
</p>

<div class="map-container">

    <img src="Board.webp" width="800">

    <div class="territory" data-name="t1" data-points="2" style="left:265.9534px; top:156.84042px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t2" data-points="1" style="left:474.92273px; top:125.87109px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t3" data-points="2" style="left:609.47284px; top:96.854736px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t4" data-points="2" style="left:176.50145px; top:339.53571px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t5" data-points="1" style="left:300.55054px; top:266.20444px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t6" data-points="2" style="left:283.99225px; top:368.94061px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t7" data-points="2" style="left:411.31229px; top:268.16699px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t8" data-points="2" style="left:500.63232px; top:236.56639px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t9" data-points="2" style="left:580.34601px; top:197.40074px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t10" data-points="2" style="left:211.02701px; top:484.63797px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t11" data-points="1" style="left:343.18039px; top:472.74225px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t12" data-points="2" style="left:465.526px; top:389.9447px;" onclick="toggleTerritory(this)"></div>
    <div class="territory" data-name="t13" data-points="1" style="left:529.68958px; top:319.32098px;" onclick="toggleTerritory(this)"></div>

</div>

<script>

let score = 0;

function pointsToMoney(points) {

    if (points === 0) return 0;
    if (points <= 11) return 6;
    if (points <= 14) return 7;
    if (points <= 17) return 8;
    if (points <= 20) return 9;
    if (points <= 23) return 10;
    if (points <= 26) return 11;
    if (points <= 29) return 12;
    if (points <= 32) return 13;
    if (points <= 35) return 14;
    if (points <= 38) return 15;

    return 16;
}

function calculateNorthBonus() {

    const northTerritories = [
        "t1","t2","t3","t4","t5","t6","t7",
        "t8","t9","t10","t11","t12","t13"
    ];

    for (const id of northTerritories) {

        const territory =
            document.querySelector(`[data-name="${id}"]`);

        if (!territory || territory.dataset.selected !== "true") {
            return 0;
        }
    }

    return 8;
}

function updateMoneyDisplay() {

    const baseMoney = pointsToMoney(score);

    const northBonus = calculateNorthBonus();

    const totalMoney = baseMoney + northBonus;

    document.getElementById("score").textContent =
        score;

    document.getElementById("baseMoney").textContent =
        baseMoney;

    document.getElementById("northBonus").textContent =
        northBonus;

    document.getElementById("totalMoney").textContent =
        totalMoney;
}

function toggleTerritory(element) {

    const points = Number(element.dataset.points);
    const name = element.dataset.name;

    if (element.dataset.selected === "true") {

        element.dataset.selected = "false";
        element.style.background = "rgba(255,0,0,0.6)";
        score -= points;

    } else {

        element.dataset.selected = "true";
        element.style.background = "rgba(0,255,0,0.7)";
        score += points;

    }

    document.getElementById("selectedTerritory").textContent =
        name;

    updateMoneyDisplay();
}

updateMoneyDisplay();

</script>

</body>
</html>
